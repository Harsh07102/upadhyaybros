<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login | UBC</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Outfit:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    :root {
      --navy: #0a1628; --navy-mid: #132040; --gold: #c9a84c; --gold-light: #e8c96d;
      --white: #fff; --gray: #6b7280; --light-gray: #e5e7eb;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Outfit', sans-serif;
      background: var(--navy);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    body::before {
      content:'';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(201,168,76,0.07) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(201,168,76,0.05) 0%, transparent 50%);
    }
    .bg-grid {
      position: absolute;
      inset: 0;
      background-image: linear-gradient(rgba(201,168,76,0.04) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(201,168,76,0.04) 1px, transparent 1px);
      background-size: 50px 50px;
    }
    .login-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(201,168,76,0.2);
      border-radius: 20px;
      padding: 3rem 2.5rem;
      width: 100%;
      max-width: 420px;
      position: relative;
      z-index: 1;
      backdrop-filter: blur(20px);
      box-shadow: 0 24px 80px rgba(0,0,0,0.4);
    }
    .login-logo {
      text-align: center;
      margin-bottom: 2rem;
    }
    .login-logo img {
      width: 70px; height: 70px;
      border-radius: 50%;
      border: 2px solid var(--gold);
      padding: 3px;
      background: #000;
      object-fit: contain;
    }
    .login-logo h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem;
      color: var(--white);
      margin-top: 0.8rem;
    }
    .login-logo p { color: var(--gold); font-size: 0.78rem; letter-spacing: 2px; margin-top: 4px; }
    .lock-badge {
      width: 48px; height: 48px;
      background: rgba(201,168,76,0.1);
      border: 1px solid rgba(201,168,76,0.3);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1.5rem;
      color: var(--gold);
      font-size: 1.2rem;
    }
    .login-title {
      text-align: center;
      color: var(--white);
      font-size: 1.15rem;
      font-weight: 600;
      margin-bottom: 0.3rem;
    }
    .login-subtitle {
      text-align: center;
      color: rgba(255,255,255,0.45);
      font-size: 0.82rem;
      margin-bottom: 2rem;
    }
    .form-group { margin-bottom: 1.2rem; }
    .form-group label {
      display: block;
      font-size: 0.82rem;
      color: rgba(255,255,255,0.7);
      font-weight: 500;
      margin-bottom: 7px;
    }
    .input-wrap { position: relative; }
    .input-wrap i {
      position: absolute;
      left: 14px; top: 50%; transform: translateY(-50%);
      color: rgba(255,255,255,0.3);
      font-size: 0.9rem;
    }
    .form-group input {
      width: 100%;
      padding: 12px 16px 12px 40px;
      background: rgba(255,255,255,0.06);
      border: 1.5px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      color: var(--white);
      font-family: 'Outfit', sans-serif;
      font-size: 0.9rem;
      outline: none;
      transition: all 0.3s ease;
    }
    .form-group input:focus { border-color: var(--gold); background: rgba(201,168,76,0.05); }
    .form-group input::placeholder { color: rgba(255,255,255,0.25); }
    .toggle-pw {
      position: absolute;
      right: 14px; top: 50%; transform: translateY(-50%);
      background: none; border: none;
      color: rgba(255,255,255,0.3);
      cursor: pointer; font-size: 0.85rem;
    }
    .btn-login {
      width: 100%;
      background: var(--gold);
      color: var(--navy);
      padding: 13px;
      border-radius: 10px;
      border: none;
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      margin-top: 0.5rem;
    }
    .btn-login:hover { background: var(--gold-light); transform: translateY(-1px); }
    .error-msg {
      background: rgba(204,34,34,0.15);
      border: 1px solid rgba(204,34,34,0.3);
      color: #fca5a5;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.85rem;
      margin-bottom: 1.2rem;
      display: flex; align-items: center; gap: 8px;
    }
    .back-link {
      text-align: center;
      margin-top: 1.5rem;
    }
    .back-link a {
      color: rgba(255,255,255,0.45);
      text-decoration: none;
      font-size: 0.82rem;
      transition: color 0.2s;
    }
    .back-link a:hover { color: var(--gold); }
    .gold-line {
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(201,168,76,0.4), transparent);
      margin: 1.5rem 0;
    }
    .secure-badge {
      display: flex; align-items: center; justify-content: center;
      gap: 6px; color: rgba(255,255,255,0.3); font-size: 0.75rem; margin-top: 1.5rem;
    }
    .secure-badge i { color: var(--gold); }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="login-card">
    <div class="login-logo">
      <img src="{{ url_for('static', filename='images/logo.png') }}" alt="UBC Logo"/>
      <h1>Upadhyay Brothers & Co.</h1>
      <p>ADMIN PORTAL</p>
    </div>
    <div class="gold-line"></div>
    <div class="lock-badge"><i class="fas fa-lock"></i></div>
    <div class="login-title">Authorized Access Only</div>
    <div class="login-subtitle">Please login with your employee credentials</div>

    {% if error %}
    <div class="error-msg"><i class="fas fa-exclamation-circle"></i> {{ error }}</div>
    {% endif %}

    <form method="POST">
      <div class="form-group">
        <label>User ID</label>
        <div class="input-wrap">
          <i class="fas fa-user"></i>
          <input type="text" name="username" placeholder="Enter your user ID" required autocomplete="username"/>
        </div>
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="input-wrap">
          <i class="fas fa-key"></i>
          <input type="password" id="pwInput" name="password" placeholder="Enter your password" required autocomplete="current-password"/>
          <button type="button" class="toggle-pw" onclick="togglePw()"><i class="fas fa-eye" id="eyeIcon"></i></button>
        </div>
      </div>
      <button type="submit" class="btn-login"><i class="fas fa-sign-in-alt"></i> Login to Dashboard</button>
      <div style="text-align:center; margin-top:1rem;">
        <a href="/admin/forgot-password" style="color:rgba(255,255,255,0.35); font-size:0.8rem; text-decoration:none; transition:color 0.2s;" onmouseover="this.style.color='#c9a84c'" onmouseout="this.style.color='rgba(255,255,255,0.35)'">
          <i class="fas fa-key"></i> Forgot your password?
        </a>
      </div>
    </form>
    <div class="back-link"><a href="/"><i class="fas fa-arrow-left"></i> Back to Website</a></div>
    <div class="secure-badge"><i class="fas fa-shield-alt"></i> Secured & Encrypted Connection</div>
  </div>
  <script>
    function togglePw() {
      const input = document.getElementById('pwInput');
      const icon = document.getElementById('eyeIcon');
      if (input.type === 'password') {
        input.type = 'text'; icon.className = 'fas fa-eye-slash';
      } else {
        input.type = 'password'; icon.className = 'fas fa-eye';
      }
    }
  </script>
</body>
</html>
